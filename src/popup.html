<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>Prompt in a Box</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font: 13px/1.4 system-ui, sans-serif;
        width: 360px;
        padding: 14px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }
      h1 small { font-weight: normal; opacity: 0.7; font-size: 11px; }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; margin: 14px 0 6px; font-weight: 600; }
      .summary-meta { font-size: 12px; opacity: 0.7; margin: 0 0 12px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row > * { flex: 1; }
      button {
        padding: 7px 10px;
        font: inherit;
        font-weight: 500;
        border: 1px solid rgba(128,128,128,0.4);
        border-radius: 4px;
        background: ButtonFace;
        color: ButtonText;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      button.primary {
        background: #2f6fe1;
        color: white;
        border-color: #2f6fe1;
      }
      .status { margin-top: 10px; font-size: 12px; min-height: 16px; opacity: 0.8; }

      .artifact {
        padding: 7px 9px;
        border: 1px solid rgba(128,128,128,0.2);
        border-radius: 5px;
        margin-bottom: 5px;
        cursor: pointer;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
      }
      .artifact:hover { background: rgba(47,111,225,0.05); border-color: rgba(47,111,225,0.3); }
      .artifact .kind-badge {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(47,111,225,0.12);
        color: #2f6fe1;
      }
      .artifact .kind-image { background: rgba(200,130,30,0.14); color: #c8821e; }
      .artifact .kind-json { background: rgba(130,200,30,0.14); color: #4a8a16; }
      .artifact .kind-html { background: rgba(200,30,130,0.12); color: #c81e82; }
      .artifact .title {
        font-size: 12px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .artifact .time { font-size: 10px; opacity: 0.6; font-family: ui-monospace, monospace; }
      .empty { font-size: 12px; opacity: 0.55; padding: 8px 4px; }

      .links { display: flex; gap: 8px; margin-top: 12px; font-size: 12px; }
      .links a {
        flex: 1;
        padding: 7px 10px;
        text-align: center;
        border: 1px solid rgba(128,128,128,0.3);
        border-radius: 4px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }
      .links a:hover { background: rgba(128,128,128,0.08); }
    </style>
  </head>
  <body>
    <h1>Prompt in a Box <small id="version"></small></h1>
    <p class="summary-meta"><span id="summaryProvider">—</span><span id="summaryMeta"></span></p>

    <div class="row">
      <button id="runNow" class="primary">Run now</button>
    </div>
    <div class="status" id="status"></div>

    <h2>Recent artifacts</h2>
    <div id="artifactList"><div class="empty">Nothing yet — artifacts appear here once the agent creates some.</div></div>

    <div class="links">
      <a id="openArtifacts">Browse all →</a>
      <a id="openOptions">Settings &amp; audit</a>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
